name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Static self-check
        run: python scripts/self_check.py

      - name: Bytecode compile
        run: python -m py_compile models.py client.py inference.py server/app.py server/tasks.py server/support_ops_env_environment.py

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: OpenEnv validate
        run: openenv validate
